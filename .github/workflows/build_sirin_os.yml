name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fix Android SDK Permissions in Docker
        run: |
          # Вытягиваем образ и вшиваем в него полные права на папку SDK (убиваем ошибку доступа)
          docker pull ghcr.io/termux/package-builder:latest
          cat << 'EOF' > Dockerfile.fix
          FROM ghcr.io/termux/package-builder:latest
          USER root
          RUN chmod -R 777 /home/builder/lib || true
          RUN chown -R builder:builder /home/builder/lib || true
          USER builder
          EOF
          docker build -t ghcr.io/termux/package-builder:latest -f Dockerfile.fix .

      - name: Build Core Packages from Source
        env:
          # Жестко запрещаем скрипту перекачивать образ, чтобы не затер наш фикс
          TERMUX_BUILD_IGNORE_DOCKER_UPDATE: "true"
        run: |
          # Полный список пакетов, включая капризный termux-am
          PACKAGES="apt bash command-not-found coreutils curl dash debianutils dialog diffutils dos2unix ed findutils gawk gnupg gpgv grep gzip inetutils less lsof nano ncurses net-tools patch readline sed tar termux-am termux-auth termux-exec termux-keyring termux-licenses termux-tools unzip util-linux xz-utils zlib"

          # Запускаем сборку
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 $PACKAGES

      - name: Create Local Repository
        run: |
          # Ставим утилиты и делаем локальный сервер для пакетов
          sudo apt-get update && sudo apt-get install -y dpkg-dev python3
          cd output
          mkdir -p dists/termux/main/binary-aarch64
          dpkg-scanpackages . /dev/null > dists/termux/main/binary-aarch64/Packages
          cd ..

      - name: Patch repo.json
        run: |
          # Направляем сборщик бутстрапа на наш сервер
          echo '[{"url": "http://localhost:8000", "distribution": "termux", "component": "main"}]' > repo.json

      - name: Generate Sirin Bootstrap
        run: |
          # Поднимаем сервер, упаковываем ядро, гасим сервер
          cd output
          python3 -m http.server 8000 &
          SERVER_PID=$!
          cd ..
          ./scripts/generate-bootstraps.sh --architectures aarch64
          kill $SERVER_PID

      - name: Upload Sirin Bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: sirin-bootstrap-aarch64
          path: "*.zip"
