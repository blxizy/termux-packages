name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pre-download SDK and Fix Permissions
        run: |
          # 1. Готовим Java для sdkmanager
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless unzip
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          # 2. Скачиваем официальный базовый SDK Termux
          ./scripts/setup-android-sdk.sh
          
          # 3. НАСИЛЬНО качаем API 33 и Build-Tools 30.0.3 прямо в папку Termux SDK
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$HOME/lib/android-sdk-9123335 "platforms;android-33" "build-tools;30.0.3"
          
          # 4. Создаем папку кэша, если её нет, и снимаем все блокировки
          mkdir -p ~/.termux-build
          sudo chmod -R 777 ~/lib ~/.termux-build

      - name: TEST BUILD ONLY - termux-am
        run: |
          # Собираем ТОЛЬКО проблемный пакет
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 termux-am
