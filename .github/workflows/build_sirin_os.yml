name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Custom SDK and Patch Termux Scripts
        run: |
          echo "=== 1. Готовим Java на сервере ==="
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless unzip
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          echo "=== 2. Создаем свой SDK в кэш-папке (которая пробросится в Докер с правами) ==="
          SDK_DIR=$HOME/.termux-build/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9123335_latest.zip
          unzip -q commandlinetools-linux-9123335_latest.zip
          mv cmdline-tools latest
          
          echo "=== 3. Качаем 33-й API в нашу новую папку ==="
          yes | ./latest/bin/sdkmanager --sdk_root=$SDK_DIR "platforms;android-33" "build-tools;30.0.3"
          yes | ./latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses >/dev/null 2>&1 || true
          
          echo "=== 4. ГЕНЕРАЛЬНЫЙ ХАК: Переписываем пути во всех сборочных скриптах Termux ==="
          cd $GITHUB_WORKSPACE
          find scripts -type f -exec sed -i 's|/home/builder/lib/android-sdk-[0-9]*|/home/builder/.termux-build/android-sdk|g' {} +

      - name: TEST BUILD ONLY - termux-am
        run: |
          # Запускаем штатную сборку.
          # Теперь скрипты Termux будут думать, что SDK лежит в /home/builder/.termux-build/android-sdk
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 termux-am
