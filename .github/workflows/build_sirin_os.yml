name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject SDK Hack into termux-am
        run: |
          # Встраиваем "троянского коня" прямо в скрипт пакета
          cat << 'EOF' >> packages/termux-am/build.sh
          
          termux_step_pre_make() {
              echo "=== 1. КЛОНИРУЕМ SDK В РАЗРЕШЕННУЮ ДЛЯ ЗАПИСИ ПАПКУ ==="
              mkdir -p ~/.termux-build/custom-sdk
              cp -r /home/builder/lib/android-sdk-*/* ~/.termux-build/custom-sdk/
              export ANDROID_HOME=~/.termux-build/custom-sdk
              
              echo "=== 2. СКАЧИВАЕМ НЕДОСТАЮЩИЙ API 33 ==="
              yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;30.0.3" || true
              
              echo "=== 3. ПРИНУДИТЕЛЬНО УКАЗЫВАЕМ ПУТЬ ДЛЯ GRADLE ==="
              echo "sdk.dir=$ANDROID_HOME" > $TERMUX_PKG_SRCDIR/local.properties
          }
          EOF

      - name: TEST BUILD ONLY - termux-am
        run: |
          # Запускаем штатную сборку, наш хак сработает изнутри контейнера
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 termux-am
