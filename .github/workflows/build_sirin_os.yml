name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK and Pre-download API 33
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          # 1. Скачиваем официальный базовый SDK Termux
          ./scripts/setup-android-sdk.sh
          
          # 2. ВОТ ОНО: Принудительно докачиваем старые зависимости ДО запуска Docker!
          yes | ~/lib/android-sdk-*/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;30.0.3"
          
          # 3. На всякий случай перекрашиваем права
          sudo chown -R 1000:1000 ~/lib ~/.termux-build || true
          sudo chmod -R 777 ~/lib ~/.termux-build || true

      - name: TEST BUILD ONLY - termux-am
        run: |
          # Тестируем ТОЛЬКО один проблемный пакет
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 termux-am
