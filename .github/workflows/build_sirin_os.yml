name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Core Packages from Source
        run: |
          # 1. Запускаем контейнер вхолостую, чтобы он развернулся в фоне
          ./scripts/run-docker.sh echo "Init container"
          
          # 2. Взламываем работающий контейнер от лица root и снимаем блокировку с Android SDK
          docker exec --user root termux-package-builder chown -R builder:builder /home/builder/lib
          docker exec --user root termux-package-builder chmod -R 777 /home/builder/lib

          # 3. Полный список пакетов без вырезаний
          PACKAGES="apt bash command-not-found coreutils curl dash debianutils dialog diffutils dos2unix ed findutils gawk gnupg gpgv grep gzip inetutils less lsof nano ncurses net-tools patch readline sed tar termux-am termux-auth termux-exec termux-keyring termux-licenses termux-tools unzip util-linux xz-utils zlib"

          # 4. Запускаем честную сборку (теперь Gradle сможет докачать API 33)
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 $PACKAGES

      - name: Create Local Repository
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-dev python3
          cd output
          mkdir -p dists/termux/main/binary-aarch64
          dpkg-scanpackages . /dev/null > dists/termux/main/binary-aarch64/Packages
          cd ..

      - name: Patch repo.json
        run: |
          echo '[{"url": "http://localhost:8000", "distribution": "termux", "component": "main"}]' > repo.json

      - name: Generate Sirin Bootstrap
        run: |
          cd output
          python3 -m http.server 8000 &
          SERVER_PID=$!
          cd ..
          ./scripts/generate-bootstraps.sh --architectures aarch64
          kill $SERVER_PID

      - name: Upload Sirin Bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: sirin-bootstrap-aarch64
          path: "*.zip"
