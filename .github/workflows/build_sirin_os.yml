name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: TEST BUILD ONLY - termux-am
        run: |
          # ПОСЛАЛИ ВСЁ НА ХУЙ: Делаем грязный хак прямо внутри Docker-контейнера
          cat << 'EOF' > run_inside_docker.sh
          #!/bin/bash
          
          echo "=== 1. УБИВАЕМ БЛОКИРОВКУ ПРАВ НА ВШИТОМ SDK ==="
          sudo chmod -R 777 /home/builder/lib/android-sdk-*
          
          echo "=== 2. НАСИЛЬНО КАЧАЕМ API 33 ДО ЗАПУСКА GRADLE ==="
          yes | /home/builder/lib/android-sdk-*/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;30.0.3"
          
          echo "=== 3. СОБИРАЕМ ТОЛЬКО TERMUX-AM ==="
          ./build-package.sh -a aarch64 termux-am
          EOF
          
          # Делаем скрипт исполняемым и скармливаем его докеру
          chmod +x run_inside_docker.sh
          ./scripts/run-docker.sh ./run_inside_docker.sh
