name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Host Environment & Android SDK (with Custom SDK Fix)
        run: |
          # Официальная подготовка среды Termux на самом сервере
          sudo ./scripts/setup-ubuntu.sh
          ./scripts/setup-android-sdk.sh

          echo "=== 1. Готовим Java на сервере ==="
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless unzip
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          echo "=== 2. Создаем свой SDK в кэш-папке (пробрасывается в Докер с правами) ==="
          SDK_DIR=$HOME/.termux-build/android-sdk
          mkdir -p $SDK_DIR/cmdline-tools
          cd $SDK_DIR/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9123335_latest.zip
          unzip -q commandlinetools-linux-9123335_latest.zip
          mv cmdline-tools latest
          
          echo "=== 3. Качаем 33-й API в нашу новую папку ==="
          yes | ./latest/bin/sdkmanager --sdk_root=$SDK_DIR "platforms;android-33" "build-tools;30.0.3"
          yes | ./latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses >/dev/null 2>&1 || true
          
          echo "=== 4. ГЕНЕРАЛЬНЫЙ ХАК: Переписываем пути во всех сборочных скриптах Termux ==="
          cd $GITHUB_WORKSPACE
          find scripts -type f -exec sed -i 's|/home/builder/lib/android-sdk-[0-9]*|/home/builder/.termux-build/android-sdk|g' {} +

      - name: Build Core Packages from Source
        run: |
          # Полный список пакетов, включая termux-am
          PACKAGES="apt bash command-not-found coreutils curl dash debianutils dialog diffutils dos2unix ed findutils gawk gnupg gpgv grep gzip inetutils less lsof nano ncurses net-tools patch readline sed tar termux-am termux-auth termux-exec termux-keyring termux-licenses termux-tools unzip util-linux xz-utils zlib"

          # Запускаем сборку (Docker подхватит наш рабочий SDK из кэша)
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 $PACKAGES

      - name: Create Local Repository
        run: |
          # Устанавливаем утилиты для локального сервера
          sudo apt-get update && sudo apt-get install -y dpkg-dev python3
          cd output
          mkdir -p dists/termux/main/binary-aarch64
          dpkg-scanpackages . /dev/null > dists/termux/main/binary-aarch64/Packages
          cd ..

      - name: Patch repo.json
        run: |
          # Направляем сборщик бутстрапа на локальный сервер
          echo '[{"url": "http://localhost:8000", "distribution": "termux", "component": "main"}]' > repo.json

      - name: Generate Sirin Bootstrap
        run: |
          # Поднимаем сервер, упаковываем ядро и гасим сервер
          cd output
          python3 -m http.server 8000 &
          SERVER_PID=$!
          cd ..
          ./scripts/generate-bootstraps.sh --architectures aarch64
          kill $SERVER_PID

      - name: Upload Sirin Bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: sirin-bootstrap-aarch64
          path: "*.zip"
