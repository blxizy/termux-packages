name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK and Fix Permissions
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk-headless
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          
          # Скачиваем SDK на сервер
          ./scripts/setup-android-sdk.sh
          
          # Перекрашиваем владельца папки на юзера Docker (UID 1000)
          sudo chown -R 1000:1000 ~/lib ~/.termux-build || true
          sudo chmod -R 777 ~/lib ~/.termux-build || true

      - name: TEST BUILD ONLY - termux-am
        run: |
          # ПОСЛАЛИ ВСЁ НА ХУЙ: Тестируем только один проблемный пакет!
          ./scripts/run-docker.sh ./build-package.sh -a aarch64 termux-am
