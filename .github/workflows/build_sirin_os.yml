name: Build Sirin OS (aarch64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Core Packages from Source
        run: |
          # 1. Создаем локальный скрипт, который выполнится ВНУТРИ докера
          cat << 'EOF' > run_inside_docker.sh
          #!/bin/bash
          
          # Железобетонно снимаем защиту со всей папки с Android SDK (игнорируя ошибки, если папки нет)
          sudo chmod -R 777 /home/builder/lib || true
          sudo chown -R $(whoami) /home/builder/lib || true

          # Запускаем честную сборку всех пакетов, включая termux-am
          ./build-package.sh -a aarch64 apt bash command-not-found coreutils curl dash debianutils dialog diffutils dos2unix ed findutils gawk gnupg gpgv grep gzip inetutils less lsof nano ncurses net-tools patch readline sed tar termux-am termux-auth termux-exec termux-keyring termux-licenses termux-tools unzip util-linux xz-utils zlib
          EOF
          
          # 2. Делаем наш скрипт исполняемым
          chmod +x run_inside_docker.sh
          
          # 3. Скармливаем наш скрипт докеру
          ./scripts/run-docker.sh ./run_inside_docker.sh

      - name: Create Local Repository
        run: |
          # Устанавливаем утилиты для создания репозитория
          sudo apt-get update && sudo apt-get install -y dpkg-dev python3
          
          # Генерируем индексные файлы для свежесобранных пакетов
          cd output
          mkdir -p dists/termux/main/binary-aarch64
          dpkg-scanpackages . /dev/null > dists/termux/main/binary-aarch64/Packages
          cd ..

      - name: Patch repo.json
        run: |
          # Направляем сборщик бутстрапа на наш локальный сервер
          echo '[{"url": "http://localhost:8000", "distribution": "termux", "component": "main"}]' > repo.json

      - name: Generate Sirin Bootstrap
        run: |
          # Запускаем локальный сервер в фоне
          cd output
          python3 -m http.server 8000 &
          SERVER_PID=$!
          cd ..

          # Запускаем упаковку (он скачает пакеты с нашего локального сервера)
          ./scripts/generate-bootstraps.sh --architectures aarch64

          # Убиваем сервер
          kill $SERVER_PID

      - name: Upload Sirin Bootstrap
        uses: actions/upload-artifact@v4
        with:
          name: sirin-bootstrap-aarch64
          path: "*.zip"
